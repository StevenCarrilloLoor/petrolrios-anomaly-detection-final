services:
  postgres:
    image: postgres:16-alpine
    container_name: petrolrios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: petrolrios
      POSTGRES_USER: petrolrios
      POSTGRES_PASSWORD: petrolrios_dev_2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrolrios"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
